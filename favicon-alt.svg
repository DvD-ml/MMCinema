<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Fondo circular con gradiente -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Círculo principal -->
  <circle cx="64" cy="64" r="64" fill="url(#grad)"/>
  
  <!-- Sombra interior -->
  <circle cx="64" cy="64" r="64" fill="none" stroke="#000" stroke-width="4" opacity="0.1"/>
  
  <!-- Texto MM -->
  <text x="64" y="88" font-family="Arial Black, sans-serif" font-size="64" font-weight="900" fill="#1a1a2e" text-anchor="middle" letter-spacing="-4">MM</text>
  
  <!-- Brillo superior -->
  <ellipse cx="64" cy="32" rx="40" ry="16" fill="#fff" opacity="0.2"/>
</svg>
