<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Fondo circular -->
  <circle cx="64" cy="64" r="64" fill="url(#grad)"/>
  
  <!-- Rueda de película clásica (Film Reel) -->
  <!-- Círculo exterior principal -->
  <circle cx="64" cy="64" r="48" fill="none" stroke="#1a1a2e" stroke-width="4"/>
  
  <!-- Círculos internos (para efecto de profundidad) -->
  <circle cx="64" cy="64" r="40" fill="none" stroke="#1a1a2e" stroke-width="2" opacity="0.7"/>
  <circle cx="64" cy="64" r="32" fill="none" stroke="#1a1a2e" stroke-width="2" opacity="0.7"/>
  
  <!-- Centro/hub de la rueda -->
  <circle cx="64" cy="64" r="10" fill="#1a1a2e"/>
  <circle cx="64" cy="64" r="6" fill="#f59e0b" opacity="0.8"/>
  
  <!-- Radios/spokes (8 radios) -->
  <line x1="64" y1="16" x2="64" y2="48" stroke="#1a1a2e" stroke-width="2"/>
  <line x1="64" y1="80" x2="64" y2="112" stroke="#1a1a2e" stroke-width="2"/>
  <line x1="16" y1="64" x2="48" y2="64" stroke="#1a1a2e" stroke-width="2"/>
  <line x1="80" y1="64" x2="112" y2="64" stroke="#1a1a2e" stroke-width="2"/>
  
  <!-- Radios diagonales -->
  <line x1="31" y1="31" x2="50" y2="50" stroke="#1a1a2e" stroke-width="2"/>
  <line x1="97" y1="97" x2="78" y2="78" stroke="#1a1a2e" stroke-width="2"/>
  <line x1="97" y1="31" x2="78" y2="50" stroke="#1a1a2e" stroke-width="2"/>
  <line x1="31" y1="97" x2="50" y2="78" stroke="#1a1a2e" stroke-width="2"/>
  
  <!-- Pequeños círculos en los extremos de los radios (para efecto de película) -->
  <circle cx="64" cy="18" r="3" fill="#1a1a2e"/>
  <circle cx="64" cy="110" r="3" fill="#1a1a2e"/>
  <circle cx="18" cy="64" r="3" fill="#1a1a2e"/>
  <circle cx="110" cy="64" r="3" fill="#1a1a2e"/>
  <circle cx="32" cy="32" r="3" fill="#1a1a2e"/>
  <circle cx="96" cy="96" r="3" fill="#1a1a2e"/>
  <circle cx="96" cy="32" r="3" fill="#1a1a2e"/>
  <circle cx="32" cy="96" r="3" fill="#1a1a2e"/>
  
  <!-- Brillo superior -->
  <ellipse cx="64" cy="32" rx="40" ry="14" fill="#fff" opacity="0.2"/>
</svg>
